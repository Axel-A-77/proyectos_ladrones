<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Los ladrones V3</title>
  <link rel="stylesheet" href="./styles-v5.css?v=5" />
</head>
<body>
  <main class="workspace">
    <section id="stage-wrap" class="stage-wrap">
      <div id="stage" class="stage">
        <video id="presenter" class="presenter" preload="auto" playsinline></video>

        <div id="art-frame" class="art-frame">
          <img id="art-image" class="art-image" alt="Ilustración animada" />
          <div id="art-title" class="art-title"></div>
        </div>

        <div id="father-overlay" class="father-overlay">
          <div class="father-panel">
            <img id="father-panel-image" alt="Ilustración de apoyo" />
          </div>
          <div id="lower-third" class="lower-third"></div>
        </div>

        <div id="scene-badge" class="scene-badge"></div>
        <div id="focus-ring" class="focus-ring"></div>

        <div id="missing-video" class="missing-video" hidden>
          <strong>No puedo cargar papa_web.mp4.</strong>
          <span>Comprueba que se reproduzca directamente en el navegador.</span>
        </div>
      </div>
    </section>

    <section class="controls">
      <div class="control-row">
        <button id="play" type="button">Reproducir</button>
        <button id="restart" type="button">Reiniciar</button>
        <button id="fullscreen" type="button">Pantalla completa</button>
        <button id="record" type="button" class="primary">Grabar 2 minutos</button>
        <span id="timecode" class="timecode">00:00.0 / 02:00.0</span>
      </div>
      <input id="seek" class="seek" type="range" min="0" max="120" step="0.01" value="0" />
      <div class="legend">
        <span>Espacio: reproducir o pausar</span>
        <span>F: pantalla completa</span>
        <span>Esc: salir del modo grabación</span>
      </div>
    </section>
  </main>

  <script type="module" src="./app-v5.js?v=5"></script>
</body>
</html>
